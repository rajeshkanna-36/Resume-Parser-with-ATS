services:
  - type: web
    name: resume-parser-backend
    env: python
    rootDir: Backend
    buildCommand: "pip install uv && uv sync && uv run python -m spacy download en_core_web_sm"
    startCommand: "uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
